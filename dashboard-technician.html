<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Handy sQuad — Technician</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#f59e0b;--amber-dark:#b45309;--amber-light:#fef3c7;--amber-xlight:#fffbeb;
  --white:#fff;--slate-800:#1e293b;--slate-600:#475569;--slate-400:#94a3b8;
  --slate-200:#e2e8f0;--slate-100:#f1f5f9;--slate-50:#f8fafc;
  --blue-700:#1d4ed8;--blue-500:#3b82f6;--blue-50:#eff6ff;--blue-100:#dbeafe;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#86efac;
  --red:#dc2626;--red-bg:#fee2e2;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--slate-50);color:var(--slate-800);min-height:100vh}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#1c1917,#292524);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px}
.sidebar-logo .name{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.4px}
.sidebar-logo .name span{color:#fbbf24}
.sidebar-logo .role-tag{font-size:11px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;color:rgba(255,255,255,.65);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border-left:3px solid transparent;text-decoration:none}
.nav-item:hover,.nav-item.active{color:#fff;background:rgba(255,255,255,.08);border-left-color:#fbbf24}
.sidebar-bottom{margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,.1)}
.main{margin-left:240px;flex:1}
.topbar{background:var(--white);border-bottom:1px solid var(--slate-200);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.page-title{font-size:20px;font-weight:800;color:var(--slate-800)}
.page-subtitle{font-size:13px;color:var(--slate-400);font-weight:500}
.content{padding:28px}

/* Welcome */
.welcome-banner{background:linear-gradient(135deg,#1c1917,#44403c);border-radius:20px;padding:22px 28px;margin-bottom:24px;display:flex;align-items:center;gap:18px}
.welcome-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--amber),#f97316);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0}
.welcome-text h2{font-size:18px;font-weight:800;color:#fff}
.welcome-text p{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.seg-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.seg-pill{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.35);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;color:#fbbf24}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:14px;padding:18px 20px;border:1px solid var(--slate-200);display:flex;align-items:center;gap:14px}
.stat-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-val{font-size:24px;font-weight:800;color:var(--slate-800);line-height:1}
.stat-label{font-size:12px;color:var(--slate-400);font-weight:500;margin-top:3px}

/* Filter */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:9px 13px;border:2px solid var(--slate-200);border-radius:10px;font-size:13px;font-family:inherit;color:var(--slate-800);background:var(--white)}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--amber)}

/* Empty */
.empty-state{text-align:center;padding:64px 24px}
.empty-state .icon{font-size:52px;margin-bottom:14px}
.empty-state h3{font-size:16px;font-weight:700;color:var(--slate-800);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--slate-400)}

/* Cards */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

.job-card{background:var(--white);border-radius:18px;border:1px solid var(--slate-200);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow .2s,transform .2s}
.job-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.09);transform:translateY(-2px)}

.job-strip{height:5px}
.job-strip.booked{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.job-strip.completed{background:linear-gradient(90deg,#16a34a,#4ade80)}
.job-strip.rescheduled{background:linear-gradient(90deg,#d97706,#fbbf24)}
.job-strip.cancelled{background:linear-gradient(90deg,#dc2626,#f87171)}

.job-body{padding:16px 18px}

.job-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.job-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.job-name{font-size:19px;font-weight:800;color:var(--slate-800);line-height:1.15;margin-bottom:2px}

/* Place — clickable if has location */
.job-place{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--slate-500);margin-bottom:10px;cursor:default}
.job-place.linked{color:var(--blue-700);cursor:pointer;border-bottom:1px dashed var(--blue-300)}
.job-place.linked:hover{color:var(--blue-500)}

.job-detail{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--slate-500);margin-bottom:6px}
.job-detail svg{flex-shrink:0;margin-top:1px}

/* Finance row */
.job-finance{display:flex;border-top:1px solid var(--slate-100);margin-top:12px}
.jf-cell{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--slate-100)}
.jf-cell:last-child{border-right:none}
.jf-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--slate-400);margin-bottom:3px}
.jf-val{font-size:14px;font-weight:800;color:var(--slate-800)}
.jf-val.blue{color:var(--blue-700)}

/* Actions */
.job-actions{display:flex;border-top:1px solid var(--slate-100)}
.ja-btn{flex:1;padding:12px 6px;border:none;background:transparent;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--slate-500);transition:background .15s,color .15s;border-right:1px solid var(--slate-100);text-decoration:none}
.ja-btn:last-child{border-right:none}
.ja-btn:hover{background:var(--slate-50)}
.ja-btn.call{color:var(--green)}
.ja-btn.call:hover{background:var(--green-bg)}
.ja-btn.map-btn{color:var(--amber-dark)}
.ja-btn.map-btn:hover{background:var(--amber-light)}
.ja-btn.rpt{color:var(--blue-700)}
.ja-btn.rpt:hover{background:var(--blue-50)}
.ja-btn.disabled{opacity:.3;cursor:default;pointer-events:none}

/* History table */
.data-table-wrap{background:#fff;border-radius:16px;border:1px solid var(--slate-200);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.data-table{width:100%;border-collapse:collapse}
.data-table thead tr{background:var(--amber-xlight)}
.data-table th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.5px}
.data-table td{padding:12px 16px;font-size:13px;border-top:1px solid var(--slate-100);vertical-align:middle}
.data-table tr:hover td{background:var(--amber-xlight)}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--slate-200);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--slate-400);font-size:14px;gap:10px}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0}
  .stats-row{grid-template-columns:1fr 1fr}
  .jobs-grid{grid-template-columns:1fr}
}

/* Segment Work View */
.sw-section{margin-bottom:28px}
.sw-section-header{display:flex;align-items:center;gap:12px;padding:12px 18px;margin-bottom:12px;
  background:linear-gradient(135deg,#1c1917,#44403c);border-radius:12px;color:#fff}
.sw-section-title{font-size:15px;font-weight:800;flex:1}
.sw-section-count{font-size:12px;background:rgba(245,158,11,.25);border:1px solid rgba(245,158,11,.4);
  color:#fbbf24;padding:3px 10px;border-radius:20px;font-weight:700}
.sw-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid var(--slate-200)}
.sw-table thead tr{background:var(--amber-xlight)}
.sw-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--slate-500);
  text-transform:uppercase;letter-spacing:.5px}
.sw-table td{padding:11px 14px;font-size:13px;border-top:1px solid var(--slate-100);vertical-align:top}
.sw-table tr{cursor:pointer;transition:background .15s}
.sw-table tr:hover td{background:var(--amber-xlight)}
.sw-seg-pill{padding:7px 16px;border-radius:20px;border:2px solid var(--slate-200);font-size:13px;
  font-weight:600;cursor:pointer;background:#fff;color:var(--slate-600);transition:all .2s;font-family:inherit}
.sw-seg-pill.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.sw-seg-pill:hover:not(.active){border-color:var(--amber);color:var(--amber-dark)}
.remark-badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.remark-badge.empty{background:#f1f5f9;color:#94a3b8}
.remark-badge.filled{background:var(--amber-light);color:var(--amber-dark)}
</style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="name">Handy <span>sQuad</span></div>
      <div class="role-tag">⚙️ Technician</div>
    </div>
    <a class="nav-item active" href="#" onclick="showView('today',this);return false">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      Today's Jobs
    </a>
    <a class="nav-item" href="#" onclick="showView('upcoming',this);return false">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Upcoming Jobs
    </a>
    <a class="nav-item" href="#" onclick="showView('segwork',this);return false">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      My Work View
    </a>
    <a class="nav-item" href="#" onclick="showView('history',this);return false">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Job History
    </a>
    <div class="sidebar-bottom"><div id="user-badge-sidebar"></div></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title">Today's Jobs</div>
        <div class="page-subtitle" id="page-subtitle">Your assigned jobs for today</div>
      </div>
      <div id="user-badge-top"></div>
    </div>
    <div class="content">

      <div class="welcome-banner" id="welcome-banner" style="display:none">
        <div class="welcome-avatar" id="wc-init">T</div>
        <div class="welcome-text">
          <h2 id="wc-name">Technician</h2>
          <p>Your segment assignments</p>
          <div class="seg-pills" id="wc-segs"><span class="seg-pill">Loading…</span></div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--amber-light)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--amber-dark)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div><div class="stat-val" id="stat-today">—</div><div class="stat-label">Today</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--blue-50)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--blue-500)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div><div class="stat-val" id="stat-upcoming">—</div><div class="stat-label">Next 7 Days</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--green-bg)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div><div class="stat-val" id="stat-done">—</div><div class="stat-label">Done This Month</div></div>
        </div>
      </div>

      <div id="view-today">
        <div id="today-container"><div class="loading-state"><div class="spinner"></div> Loading…</div></div>
      </div>

      <div id="view-upcoming" style="display:none">
        <div class="filter-bar">
          <select id="up-seg-filter"><option value="">All My Segments</option></select>
          <button class="btn btn-secondary btn-sm" onclick="loadUpcoming()">🔄 Refresh</button>
        </div>
        <div id="upcoming-container"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>

      <div id="view-history" style="display:none">
        <div class="filter-bar">
          <label style="font-size:13px;font-weight:600;color:var(--slate-600)">From:</label>
          <input type="date" id="hist-from"/>
          <label style="font-size:13px;font-weight:600;color:var(--slate-600)">To:</label>
          <input type="date" id="hist-to"/>
          <button class="btn btn-secondary btn-sm" onclick="loadHistory()">Apply</button>
        </div>
        <div id="history-container"></div>
      </div>

      <!-- Segment Work View -->
      <div id="view-segwork" style="display:none">
        <div class="filter-bar">
          <label style="font-size:13px;font-weight:600;color:var(--slate-600)">Date:</label>
          <input type="date" id="sw-date" onchange="loadSegWork()"/>
          <div id="sw-seg-pills" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"></div>
          <button class="btn btn-secondary btn-sm" onclick="loadSegWork()">🔄 Refresh</button>
        </div>
        <div id="segwork-container"></div>
      </div>

    </div>
  </div>
</div>

<script>
let currentUser = null;
let mySegmentIds = [];

(async () => {
  currentUser = await requireAuth(['technician']);
  if (!currentUser) return;
  renderUserBadge(currentUser, 'user-badge-top');
  renderUserBadge(currentUser, 'user-badge-sidebar');
  await initTechnician();
  await loadStats();
  await loadTodayJobs();
})();

async function initTechnician() {
  document.getElementById('welcome-banner').style.display = 'flex';
  document.getElementById('wc-init').textContent = currentUser.name.charAt(0).toUpperCase();
  document.getElementById('wc-name').textContent = currentUser.name;

  // ── Try to load segments from technician_segments assignment table first ──
  const { data: assigned, error: assignErr } = await db.from('technician_segments')
    .select('segment_id, segments(id, name)')
    .eq('user_id', currentUser.id);

  if (!assignErr && assigned?.length) {
    // Use explicitly assigned segments
    const segMap = {};
    assigned.forEach(a => {
      if (a.segment_id) segMap[String(a.segment_id)] = a.segments?.name || String(a.segment_id);
    });
    mySegmentIds = Object.keys(segMap);
    const pillsEl = document.getElementById('wc-segs');
    pillsEl.innerHTML = Object.values(segMap).map(n=>`<span class="seg-pill">${n}</span>`).join('');
  } else {
    // Fallback: derive from past report_technicians
    const { data: past } = await db.from('report_technicians')
      .select('work_reports(bookings(slots(segment_id,segments(name))))')
      .eq('technician_user_id', currentUser.id);
    const segMap = {};
    if (past?.length) {
      past.forEach(p => {
        const s = p.work_reports?.bookings?.slots;
        if (s?.segment_id) segMap[String(s.segment_id)] = s.segments?.name || String(s.segment_id);
      });
      mySegmentIds = Object.keys(segMap);
    }
    const pillsEl = document.getElementById('wc-segs');
    const names = Object.values(segMap);
    pillsEl.innerHTML = names.length
      ? names.map(n=>`<span class="seg-pill">${n}</span>`).join('')
      : '<span class="seg-pill">All Segments</span>';
  }

  // All segments for filter dropdown
  const { data: allSegs } = await db.from('segments').select('id,name').order('name');
  const sel = document.getElementById('up-seg-filter');
  (allSegs||[]).forEach(s => {
    const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o);
  });

  const pillsEl = document.getElementById('wc-segs');
  const names = Object.values(segMap);
  pillsEl.innerHTML = names.length
    ? names.map(n=>`<span class="seg-pill">${n}</span>`).join('')
    : '<span class="seg-pill">All Segments</span>';
}

async function loadStats() {
  const today      = new Date().toISOString().split('T')[0];
  const nextWeek   = new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

  const { data } = await db.from('bookings').select('id,status,slots(date,segment_id)');
  const all = data || [];
  const mine = mySegmentIds.length
    ? all.filter(b => mySegmentIds.includes(String(b.slots?.segment_id)))
    : all;

  document.getElementById('stat-today').textContent    = mine.filter(b=>b.slots?.date===today && ['booked','rescheduled'].includes(b.status)).length;
  document.getElementById('stat-upcoming').textContent = mine.filter(b=>b.slots?.date>today && b.slots?.date<=nextWeek && ['booked','rescheduled'].includes(b.status)).length;
  document.getElementById('stat-done').textContent     = mine.filter(b=>b.status==='completed' && b.slots?.date>=monthStart).length;
}

async function fetchBookings(filters={}) {
  let q = db.from('bookings').select(`
    id,status,service_details,total_amount,advance_amount,attachment_link,
    customers(name,phone,alt_phone,place,address,location_link),
    slots(id,date,time,segment_id,segments(name))
  `);
  if (filters.date)     q = q.eq('slots.date', filters.date);
  if (filters.dateGt)   q = q.gt('slots.date', filters.dateGt);
  if (filters.dateLte)  q = q.lte('slots.date', filters.dateLte);
  if (filters.dateGte)  q = q.gte('slots.date', filters.dateGte);
  if (filters.statuses) q = q.in('status', filters.statuses);
  if (filters.segId)    q = q.eq('slots.segment_id', filters.segId);
  q = q.order('slots.time').limit(100);
  const { data } = await q;
  let jobs = data || [];
  if (mySegmentIds.length && !filters.segId) {
    jobs = jobs.filter(b => mySegmentIds.includes(String(b.slots?.segment_id)));
  }
  return jobs;
}

async function loadTodayJobs() {
  const today = new Date().toISOString().split('T')[0];
  const container = document.getElementById('today-container');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';
  const jobs = await fetchBookings({ date:today, statuses:['booked','rescheduled','completed'] });
  renderCards(container, jobs, 'No jobs scheduled for today');
}

async function loadUpcoming() {
  const today  = new Date().toISOString().split('T')[0];
  const nWeek  = new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const segId  = document.getElementById('up-seg-filter').value;
  const container = document.getElementById('upcoming-container');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';
  const jobs = await fetchBookings({ dateGt:today, dateLte:nWeek, statuses:['booked','rescheduled'], segId });
  renderCards(container, jobs, 'No upcoming jobs in the next 7 days');
}

async function loadHistory() {
  const from = document.getElementById('hist-from').value;
  const to   = document.getElementById('hist-to').value;
  const container = document.getElementById('history-container');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';
  let q = db.from('bookings').select(`
    id,status,service_details,total_amount,
    customers(name,phone,place),
    slots(date,time,segment_id,segments(name))
  `).eq('status','completed').order('slots.date',{ascending:false}).limit(150);
  if (from) q = q.gte('slots.date', from);
  if (to)   q = q.lte('slots.date', to);
  const { data } = await q;
  let jobs = data||[];
  if (mySegmentIds.length) jobs = jobs.filter(b=>mySegmentIds.includes(String(b.slots?.segment_id)));
  if (!jobs.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>No completed jobs</h3><p>Try adjusting the date range.</p></div>';
    return;
  }
  container.innerHTML = `<div class="data-table-wrap"><table class="data-table">
    <thead><tr>${['Date','Time','Customer','Place','Segment','Amount',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>
    ${jobs.map(b=>`<tr>
      <td>${formatDate(b.slots?.date)}</td>
      <td>${formatTime(b.slots?.time)}</td>
      <td>
        <div style="font-weight:700">${b.customers?.name||'—'}</div>
        ${b.customers?.phone?`<a href="tel:${b.customers.phone}" style="font-size:11px;color:var(--blue-700);font-weight:600">${b.customers.phone}</a>`:''}
      </td>
      <td>${b.customers?.place||'—'}</td>
      <td><span style="background:var(--amber-light);color:var(--amber-dark);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700">${b.slots?.segments?.name||'—'}</span></td>
      <td style="font-weight:700">${formatCurrency(b.total_amount)}</td>
      <td><a href="work-report.html?booking_id=${b.id}" style="color:var(--blue-700);font-size:12px;font-weight:600;text-decoration:none">📝 View Report</a></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function renderCards(container, jobs, emptyMsg) {
  if (!jobs.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><h3>${emptyMsg}</h3><p>Check back later.</p></div>`;
    return;
  }
  container.innerHTML = `<div class="jobs-grid">${jobs.map(buildCard).join('')}</div>`;
}

function buildCard(b) {
  const balance  = Math.max(0, Number(b.total_amount||0) - Number(b.advance_amount||0));
  const status   = b.status || 'booked';
  const hasLoc   = b.customers?.location_link;
  const hasPhone = b.customers?.phone;
  const seg      = b.slots?.segments?.name || '—';

  // Place element — clickable if location link exists
  const placeHtml = hasLoc
    ? `<div class="job-place linked" onclick="window.open('${escHtml(b.customers.location_link)}','_blank')" title="Open in maps">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${escHtml(b.customers?.place||'—')} <span style="font-size:10px">↗</span>
       </div>`
    : `<div class="job-place">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${escHtml(b.customers?.place||'—')}
       </div>`;

  const callBtn = hasPhone
    ? `<a href="tel:${escHtml(b.customers.phone)}" class="ja-btn call">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Call
       </a>`
    : `<span class="ja-btn disabled">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        No phone
       </span>`;

  const mapBtn = hasLoc
    ? `<a href="${escHtml(b.customers.location_link)}" target="_blank" class="ja-btn map-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Map
       </a>`
    : `<span class="ja-btn disabled">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        No map
       </span>`;

  return `<div class="job-card">
    <div class="job-strip ${status}"></div>
    <div class="job-body">
      <div class="job-top">
        <div class="job-badges">
          <span class="badge badge-${status}">${status}</span>
          <span style="background:var(--amber-light);color:var(--amber-dark);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700">${escHtml(seg)}</span>
        </div>
        <span style="font-size:11px;color:var(--slate-400);font-weight:600">#${b.id}</span>
      </div>

      <div class="job-name">${escHtml(b.customers?.name||'—')}</div>
      ${placeHtml}

      <div class="job-detail">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span><strong>${formatDate(b.slots?.date)}</strong> &nbsp;·&nbsp; ${formatTime(b.slots?.time)}</span>
      </div>

      ${b.service_details ? `<div class="job-detail">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px">${escHtml(b.service_details.substring(0,80)+(b.service_details.length>80?'…':''))}</span>
      </div>` : ''}

      ${b.customers?.address ? `<div class="job-detail">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>${escHtml(b.customers.address)}</span>
      </div>` : ''}

      ${hasPhone ? `<div class="job-detail">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <a href="tel:${escHtml(b.customers.phone)}" style="color:var(--blue-700);font-weight:700;text-decoration:none">${escHtml(b.customers.phone)}</a>
        ${b.customers.alt_phone ? `<span style="color:var(--slate-400);margin-left:6px">/ ${escHtml(b.customers.alt_phone)}</span>` : ''}
      </div>` : ''}
    </div>

    <div class="job-finance">
      <div class="jf-cell">
        <div class="jf-label">Total</div>
        <div class="jf-val">${formatCurrency(b.total_amount)}</div>
      </div>
      <div class="jf-cell">
        <div class="jf-label">Advance</div>
        <div class="jf-val">${formatCurrency(b.advance_amount||0)}</div>
      </div>
      <div class="jf-cell">
        <div class="jf-label">Balance</div>
        <div class="jf-val blue">${formatCurrency(balance)}</div>
      </div>
    </div>

    <div class="job-actions">
      ${callBtn}
      ${mapBtn}
      <a href="work-report.html?booking_id=${b.id}" class="ja-btn rpt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Report
      </a>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SEGMENT WORK VIEW ─────────────────────────────────────────
let swData = [];
let swFilter = '';

async function loadSegWork() {
  const date = document.getElementById('sw-date').value;
  const container = document.getElementById('segwork-container');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';

  // Fetch bookings for my segments on the selected date
  let q = db.from('bookings')
    .select(`id,status,service_details,total_amount,advance_amount,remark,
      customers(name,phone,place,address,alt_phone,location_link),
      slots(id,date,time,segment_id,segments(id,name))`)
    .order('slots(date)', { ascending: true })
    .order('slots(time)', { ascending: true })
    .in('status', ['booked','rescheduled','completed']);
  if (date) q = q.eq('slots.date', date);

  const { data } = await q;
  let all = (data || []).filter(b => b.slots?.date);

  // Filter to my segments if assigned
  if (mySegmentIds.length) {
    all = all.filter(b => mySegmentIds.includes(String(b.slots?.segment_id)));
  }
  swData = all;

  // Build segment pills
  const segsMap = {};
  swData.forEach(b => {
    const s = b.slots?.segments;
    if (s) segsMap[s.id] = s.name;
  });

  const pillsBar = document.getElementById('sw-seg-pills');
  pillsBar.innerHTML = `<button class="sw-seg-pill ${swFilter===''?'active':''}" onclick="setSwFilter('')">All</button>`;
  Object.entries(segsMap).forEach(([id, name]) => {
    pillsBar.innerHTML += `<button class="sw-seg-pill ${swFilter===String(id)?'active':''}" onclick="setSwFilter('${id}')">${name}</button>`;
  });

  renderSegWork(container);
}

function setSwFilter(segId) {
  swFilter = String(segId);
  document.querySelectorAll('.sw-seg-pill').forEach(p => {
    const isAll = p.textContent.trim() === 'All';
    p.classList.toggle('active', isAll ? segId === '' : p.getAttribute('onclick')?.includes(`'${segId}'`));
  });
  renderSegWork(document.getElementById('segwork-container'));
}

function renderSegWork(container) {
  const filtered = swFilter
    ? swData.filter(b => String(b.slots?.segments?.id) === swFilter)
    : swData;

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>No jobs found</h3><p>No bookings for your segments on this date.</p></div>`;
    return;
  }

  // Group by segment
  const groups = {};
  filtered.forEach(b => {
    const seg = b.slots?.segments;
    const key = seg?.id || 'unknown';
    if (!groups[key]) groups[key] = { name: seg?.name || 'Unknown', bookings: [] };
    groups[key].bookings.push(b);
  });

  container.innerHTML = Object.values(groups).map(g => `
    <div class="sw-section">
      <div class="sw-section-header">
        <div class="sw-section-title">🔧 ${escHtml(g.name)}</div>
        <div class="sw-section-count">${g.bookings.length} job${g.bookings.length!==1?'s':''}</div>
      </div>
      <div class="data-table-wrap">
      <table class="sw-table">
        <thead><tr>
          <th>Customer</th><th>Phone</th><th>Place</th>
          <th>Date / Time</th><th>Work Details</th><th>Status</th><th>Remark</th>
        </tr></thead>
        <tbody>
          ${g.bookings.map(b => {
            const hasRemark = b.remark && b.remark.trim();
            const hasLoc = b.customers?.location_link;
            return `<tr>
              <td>
                <strong>${escHtml(b.customers?.name||'—')}</strong>
                <div style="font-size:11px;color:var(--slate-400)">#${b.id}</div>
              </td>
              <td>
                ${b.customers?.phone
                  ? `<a href="tel:${escHtml(b.customers.phone)}" style="color:var(--amber-dark);font-weight:700;text-decoration:none">${escHtml(b.customers.phone)}</a>`
                  : '—'}
              </td>
              <td>
                ${hasLoc
                  ? `<a href="${escHtml(b.customers.location_link)}" target="_blank" style="color:var(--amber-dark);font-weight:600;text-decoration:none">📍 ${escHtml(b.customers?.place||'—')} ↗</a>`
                  : `<span style="font-weight:600">${escHtml(b.customers?.place||'—')}</span>`}
              </td>
              <td>
                <strong>${formatDate(b.slots?.date)}</strong>
                <div style="font-size:11px;color:var(--slate-400)">${formatTime(b.slots?.time)}</div>
              </td>
              <td style="max-width:180px;font-size:12px;color:var(--slate-600)">
                ${b.service_details ? escHtml(b.service_details.substring(0,100)+(b.service_details.length>100?'…':'')) : '—'}
              </td>
              <td><span class="badge badge-${b.status}">${b.status}</span></td>
              <td>
                <span class="remark-badge ${hasRemark?'filled':'empty'}">
                  ${hasRemark ? escHtml(b.remark.substring(0,40)+(b.remark.length>40?'…':'')) : 'No remark'}
                </span>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `).join('');
}

function showView(view, el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if (el) el.classList.add('active');
  ['today','upcoming','history','segwork'].forEach(v => {
    document.getElementById('view-'+v).style.display = v===view?'block':'none';
  });
  const meta = {
    today:   ["Today's Jobs",     "Your assigned jobs for today"],
    upcoming:["Upcoming Jobs",    "Jobs in the next 7 days"],
    history: ["Job History",      "Your completed jobs"],
    segwork: ["My Work View",     "Your segment jobs sorted by date with remarks"]
  };
  document.getElementById('page-title').textContent    = meta[view][0];
  document.getElementById('page-subtitle').textContent = meta[view][1];
  if (view==='upcoming') loadUpcoming();
  if (view==='segwork')  { document.getElementById('sw-date').value=new Date().toISOString().split('T')[0]; loadSegWork(); }
  if (view==='history') {
    const t = new Date().toISOString().split('T')[0];
    const m = new Date(Date.now()-30*86400000).toISOString().split('T')[0];
    document.getElementById('hist-from').value = m;
    document.getElementById('hist-to').value   = t;
    loadHistory();
  }
}
</script>
