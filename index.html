<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Handy sQuad — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
  :root {
    --blue-900:#1e3a8a; --blue-700:#1d4ed8; --blue-500:#3b82f6;
    --blue-100:#dbeafe; --blue-50:#eff6ff;
    --white:#ffffff; --slate-800:#1e293b; --slate-500:#64748b; --slate-200:#e2e8f0;
  }
  body {
    font-family:'Plus Jakarta Sans',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-700) 50%,var(--blue-500) 100%);
    display:flex;align-items:center;justify-content:center;padding:20px;
    position:relative;overflow:hidden;
  }
  /* Geometric background */
  body::before {
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .card {
    background:var(--white);border-radius:24px;padding:48px 44px;
    width:100%;max-width:420px;
    box-shadow:0 32px 80px rgba(0,0,0,0.25);
    position:relative;
    animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn { from { transform:translateY(40px) scale(.95);opacity:0; } to { transform:none;opacity:1; } }
  .logo-wrap { text-align:center;margin-bottom:36px; }
  .logo-icon {
    width:64px;height:64px;background:linear-gradient(135deg,var(--blue-700),var(--blue-500));
    border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:16px;box-shadow:0 8px 24px rgba(59,130,246,.35);
  }
  .logo-icon svg { color:white; }
  .logo-name { font-size:26px;font-weight:800;color:var(--slate-800);letter-spacing:-.5px; }
  .logo-name span { color:var(--blue-700); }
  .logo-sub { font-size:13px;color:var(--slate-500);margin-top:4px;font-weight:500; }
  .form-group { margin-bottom:18px; }
  label { display:block;font-size:13px;font-weight:600;color:var(--slate-800);margin-bottom:7px; }
  input {
    width:100%;padding:13px 16px;border:2px solid var(--slate-200);border-radius:12px;
    font-size:15px;color:var(--slate-800);background:#f8fafc;
    transition:border .2s,box-shadow .2s,background .2s;
    font-family:inherit;
  }
  input:focus { outline:none;border-color:var(--blue-500);background:white;box-shadow:0 0 0 4px rgba(59,130,246,.12); }
  .btn-login {
    width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-700),var(--blue-500));
    color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;
    cursor:pointer;margin-top:8px;transition:all .2s;
    box-shadow:0 6px 20px rgba(59,130,246,.35);font-family:inherit;
  }
  .btn-login:hover { transform:translateY(-2px);box-shadow:0 10px 28px rgba(59,130,246,.45); }
  .btn-login:active { transform:none; }
  .btn-login:disabled { opacity:.6;cursor:not-allowed;transform:none; }
  .error-msg { background:#fee2e2;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;display:none; }
  .divider { text-align:center;margin:20px 0;color:var(--slate-500);font-size:12px;font-weight:500;position:relative; }
  .divider::before,.divider::after { content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--slate-200); }
  .divider::before { left:0; } .divider::after { right:0; }
  .footer-note { text-align:center;font-size:12px;color:var(--slate-500);margin-top:24px; }
  .spinner { display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <div class="logo-name">Handy <span>sQuad</span></div>
    <div class="logo-sub">Service Management Platform</div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@handysquad.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>

  <div class="footer-note">Handy sQuad &copy; 2025 · All rights reserved</div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in, redirect
(async () => {
  const { data:{ session } } = await db.auth.getSession();
  if (session) redirectByRole();
})();

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  if (!email || !password) { showError('Please enter email and password.'); return; }

  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  btn.disabled = true;
  err.style.display = 'none';

  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { showError(error.message); btn.innerHTML='Sign In'; btn.disabled=false; return; }

  redirectByRole();
}

async function redirectByRole() {
  const { data:{ session } } = await db.auth.getSession();
  if (!session) return;
  const { data: user } = await db.from('users').select('role').eq('id', session.user.id).single();
  if (!user) return;
  const map = { admin:'dashboard-admin.html', sales:'dashboard-sales.html', scheduling:'dashboard-scheduling.html', technician:'dashboard-technician.html' };
  window.location.href = map[user.role] || 'index.html';
}

function showError(msg) {
  const e = document.getElementById('error-msg');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('login-btn').innerHTML = 'Sign In';
  document.getElementById('login-btn').disabled = false;
}
</script>
</body>
</html>
