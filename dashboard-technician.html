<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Handy sQuad — Technician</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#f59e0b;--adark:#b45309;--alight:#fef3c7;--axlight:#fffbeb;
  --white:#fff;--s800:#1e293b;--s600:#475569;--s400:#94a3b8;
  --s200:#e2e8f0;--s100:#f1f5f9;--s50:#f8fafc;
  --b700:#1d4ed8;--b500:#3b82f6;--b50:#eff6ff;--b100:#dbeafe;
  --green:#16a34a;--gbg:#f0fdf4;--gbd:#86efac;
  --red:#dc2626;--rbg:#fee2e2;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f1f5f9;color:var(--s800);min-height:100vh;padding-bottom:72px}

/* Header */
.hdr{background:linear-gradient(135deg,#1c1917,#292524);padding:14px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--amber),#f97316);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.hdr-name{font-size:15px;font-weight:800;color:#fff}
.hdr-role{font-size:10px;color:#fbbf24;font-weight:700;letter-spacing:.5px}
.hdr-segs{display:flex;gap:5px;flex-wrap:wrap;padding:6px 16px 10px}
.seg-tag{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.3);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;color:#fbbf24}

/* Bottom nav */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#fff;border-top:1px solid var(--s200);display:flex;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;border:none;background:transparent;cursor:pointer;color:var(--s400);font-family:inherit;position:relative;transition:color .2s}
.bn.on{color:var(--adark)}
.bn svg{margin-bottom:2px}
.bn-lbl{font-size:10px;font-weight:700}
.bn-dot{position:absolute;top:6px;right:calc(50% - 16px);background:var(--red);color:#fff;border-radius:20px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center;display:none}

/* Content */
.page{padding:14px 14px 0;display:none}
.page.on{display:block}

/* Date strip for work view */
.date-strip{display:flex;align-items:center;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.date-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:2px solid var(--s200);font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--s600);font-family:inherit;transition:all .15s;white-space:nowrap}
.date-btn.on{background:var(--amber);color:#fff;border-color:var(--amber)}
.date-inp{padding:8px 12px;border:2px solid var(--s200);border-radius:20px;font-size:12px;font-family:inherit;color:var(--s800);background:#fff;cursor:pointer}
.date-inp:focus{outline:none;border-color:var(--amber)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sc{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--s200);text-align:center}
.sc-v{font-size:22px;font-weight:800;color:var(--s800)}
.sc-l{font-size:10px;color:var(--s400);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}

/* Section label */
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--s400);margin-bottom:10px}

/* Job card */
.jc{background:#fff;border-radius:16px;border:1px solid var(--s200);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.jc-bar{height:4px}
.jc-bar.booked{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.jc-bar.completed{background:linear-gradient(90deg,#16a34a,#4ade80)}
.jc-bar.rescheduled{background:linear-gradient(90deg,#d97706,#fbbf24)}
.jc-bar.cancelled{background:linear-gradient(90deg,#dc2626,#f87171)}
.jc-body{padding:14px 15px}

/* Top row: name + status */
.jc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.jc-name{font-size:18px;font-weight:800;line-height:1.15}
.jc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.b-booked{background:#dbeafe;color:#1d4ed8}
.b-completed{background:#dcfce7;color:#16a34a}
.b-rescheduled{background:#fef3c7;color:#d97706}
.b-cancelled{background:#fee2e2;color:#dc2626}
.b-seg{background:var(--alight);color:var(--adark)}

/* Info rows */
.jc-info{display:flex;gap:6px;align-items:flex-start;font-size:13px;color:var(--s600);margin-bottom:6px;line-height:1.4}
.jc-info svg{flex-shrink:0;margin-top:2px;color:var(--s400)}
.jc-info a{color:var(--b700);font-weight:700;text-decoration:none}

/* Finance bar */
.jc-fin{display:flex;border-top:1px solid var(--s100);margin-top:10px}
.jf{flex:1;padding:9px 0;text-align:center;border-right:1px solid var(--s100)}
.jf:last-child{border-right:none}
.jf-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--s400);margin-bottom:2px}
.jf-v{font-size:13px;font-weight:800;color:var(--s800)}
.jf-v.bl{color:var(--b700)}

/* Actions — large tap targets */
.jc-act{display:flex;border-top:1px solid var(--s100)}
.ja{flex:1;padding:13px 6px;border:none;background:transparent;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;border-right:1px solid var(--s100);text-decoration:none;font-family:inherit;color:var(--s500);transition:background .12s}
.ja:last-child{border-right:none}
.ja.call{color:var(--green)}.ja.call:hover{background:var(--gbg)}
.ja.map{color:var(--adark)}.ja.map:hover{background:var(--alight)}
.ja.rpt{color:var(--b700)}.ja.rpt:hover{background:var(--b50)}
.ja.off{opacity:.3;pointer-events:none}

/* Empty/loading */
.empty{text-align:center;padding:52px 20px}
.empty .icon{font-size:44px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:700;margin-bottom:5px}
.empty p{font-size:13px;color:var(--s400)}
.ld{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--s400);font-size:13px;gap:8px}
.sp{display:inline-block;width:18px;height:18px;border:2px solid var(--s200);border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-av" id="hav">T</div>
    <div>
      <div class="hdr-name" id="hname">Loading…</div>
      <div class="hdr-role">Technician</div>
    </div>
  </div>
  <button onclick="logout()" style="background:none;border:none;cursor:pointer;color:#94a3b8;padding:6px">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>
</div>
<div class="hdr-segs" id="hsegs" style="background:linear-gradient(135deg,#1c1917,#292524)"></div>

<!-- MAIN WORK PAGE (default — today + toggle for history) -->
<div class="page on" id="page-work">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-top:2px">
    <div class="sec" style="margin-bottom:0">My Jobs</div>
    <button id="hist-toggle-btn" onclick="toggleHistory()" style="background:var(--b50);color:var(--b700);border:1px solid var(--b100);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">
      📅 View History
    </button>
  </div>

  <!-- Today mode (default) -->
  <div id="mode-today">
    <div class="stats">
      <div class="sc"><div class="sc-v" id="st-today">—</div><div class="sc-l">Today</div></div>
      <div class="sc"><div class="sc-v" id="st-week">—</div><div class="sc-l">This Week</div></div>
      <div class="sc"><div class="sc-v" id="st-month">—</div><div class="sc-l">This Month</div></div>
    </div>
    <div id="today-jobs"><div class="ld"><div class="sp"></div> Loading…</div></div>
  </div>

  <!-- History mode (hidden by default) -->
  <div id="mode-history" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <input type="date" id="hist-from" class="date-inp"/>
      <span style="font-size:12px;color:var(--s400);font-weight:600">to</span>
      <input type="date" id="hist-to" class="date-inp"/>
      <button onclick="loadHistory()" style="padding:8px 14px;border-radius:20px;background:var(--amber);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Apply</button>
    </div>
    <div id="history-jobs"></div>
  </div>
</div>

<!-- UPCOMING PAGE -->
<div class="page" id="page-upcoming">
  <div class="stats" style="margin-top:2px">
    <div class="sc"><div class="sc-v" id="su-count">—</div><div class="sc-l">Upcoming</div></div>
    <div class="sc"><div class="sc-v" id="su-week">—</div><div class="sc-l">This Week</div></div>
    <div class="sc"><div class="sc-v" id="su-total">—</div><div class="sc-l">Total ₹</div></div>
  </div>
  <div class="date-strip" id="upcoming-dates"></div>
  <div id="upcoming-jobs"><div class="ld"><div class="sp"></div></div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <button class="bn on" id="bn-work" onclick="switchPage('work',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="bn-lbl">My Jobs</span>
    <span class="bn-dot" id="bn-dot">0</span>
  </button>
  <button class="bn" id="bn-upcoming" onclick="switchPage('upcoming',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="bn-lbl">Upcoming</span>
  </button>
</nav>

<script>
var {createClient}=supabase;
var db=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function logout(){await db.auth.signOut();window.location.href='index.html';}

function toast(msg,type='success'){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';c.style.cssText='position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;';document.body.appendChild(c);}
  const t=document.createElement('div');
  t.style.cssText=`padding:12px 18px;border-radius:10px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);max-width:300px;background:${type==='error'?'#dc2626':type==='warning'?'#d97706':'#1d4ed8'};`;
  t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);
}

let currentUser=null;
let mySegIds=[];
let historyLoaded=false;
let showingHistory=false;
let upcomingData=[];

(async()=>{
  const {data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const {data:u}=await db.from('users').select('*').eq('id',session.user.id).single();
  if(!u||u.role!=='technician'){alert('Access denied');await db.auth.signOut();window.location.href='index.html';return;}
  currentUser=u;

  document.getElementById('hav').textContent=u.name.charAt(0).toUpperCase();
  document.getElementById('hname').textContent=u.name;

  await initSegments();
  await loadStats();
  await loadTodayJobs();
})();

async function initSegments(){
  const {data:assigned}=await db.from('technician_segments').select('segment_id,segments(id,name)').eq('user_id',currentUser.id);
  const sm={};
  if(assigned?.length){
    assigned.forEach(a=>{if(a.segment_id)sm[String(a.segment_id)]=a.segments?.name||'';});
  } else {
    const {data:past}=await db.from('report_technicians').select('work_reports(bookings(slots(segment_id,segments(name))))').eq('technician_user_id',currentUser.id);
    (past||[]).forEach(p=>{const s=p.work_reports?.bookings?.slots;if(s?.segment_id)sm[String(s.segment_id)]=s.segments?.name||'';});
  }
  mySegIds=Object.keys(sm);
  const names=Object.values(sm).filter(Boolean);
  document.getElementById('hsegs').innerHTML=names.length
    ?names.map(n=>`<span class="seg-tag">${n}</span>`).join('')
    :'<span class="seg-tag">All Segments</span>';
}

async function loadStats(){
  const today=new Date().toISOString().split('T')[0];
  const weekStart=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const monthStart=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
  const {data}=await db.from('bookings').select('id,status,slots(date,segment_id)');
  const all=data||[];
  const mine=mySegIds.length?all.filter(b=>mySegIds.includes(String(b.slots?.segment_id))):all;
  const tc=mine.filter(b=>b.slots?.date===today&&['booked','rescheduled'].includes(b.status)).length;
  document.getElementById('st-today').textContent=tc;
  document.getElementById('st-week').textContent=mine.filter(b=>b.slots?.date>=weekStart&&['booked','rescheduled','completed'].includes(b.status)).length;
  document.getElementById('st-month').textContent=mine.filter(b=>b.slots?.date>=monthStart&&b.status==='completed').length;
  if(tc>0){const d=document.getElementById('bn-dot');d.textContent=tc;d.style.display='block';}

  // Upcoming stats
  const nWeek=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
  const up=mine.filter(b=>b.slots?.date>today&&['booked','rescheduled'].includes(b.status));
  document.getElementById('su-count').textContent=up.length;
  document.getElementById('su-week').textContent=up.filter(b=>b.slots?.date<=nWeek).length;
}

async function loadTodayJobs(){
  const today=new Date().toISOString().split('T')[0];
  const c=document.getElementById('today-jobs');
  c.innerHTML='<div class="ld"><div class="sp"></div> Loading…</div>';
  const jobs=await fetchJobs({date:today,statuses:['booked','rescheduled','completed']});
  renderCards(c,jobs,'No jobs today','✅','Check upcoming for future jobs');
}

async function loadHistory(){
  const from=document.getElementById('hist-from').value;
  const to=document.getElementById('hist-to').value;
  const c=document.getElementById('history-jobs');
  c.innerHTML='<div class="ld"><div class="sp"></div></div>';
  let q=db.from('bookings').select(`id,status,service_details,total_amount,advance_amount,
    customers(name,phone,alt_phone,place,address,location_link),
    slots(id,date,time,segment_id,segments(name))`).order('slots(date)',{ascending:false}).limit(200);
  if(from)q=q.gte('slots.date',from);
  if(to)q=q.lte('slots.date',to);
  const{data}=await q;
  let jobs=(data||[]).filter(b=>b.slots?.date);
  if(mySegIds.length)jobs=jobs.filter(b=>mySegIds.includes(String(b.slots?.segment_id)));
  renderCards(c,jobs,'No jobs in this range','📭','Try a wider date range');
}

async function loadUpcomingPage(){
  const today=new Date().toISOString().split('T')[0];
  const c=document.getElementById('upcoming-jobs');
  c.innerHTML='<div class="ld"><div class="sp"></div></div>';
  const jobs=await fetchJobs({dateGt:today,statuses:['booked','rescheduled']});
  upcomingData=jobs;

  // Build date pills
  const dates=[...new Set(jobs.map(b=>b.slots?.date).filter(Boolean))].sort();
  const bar=document.getElementById('upcoming-dates');
  bar.innerHTML=`<button class="date-btn on" onclick="filterUpcoming('all',this)">All (${jobs.length})</button>`
    +dates.map(d=>{
      const cnt=jobs.filter(b=>b.slots?.date===d).length;
      return `<button class="date-btn" onclick="filterUpcoming('${d}',this)">${fmtDate(d)} <span style="background:rgba(0,0,0,.08);border-radius:10px;padding:1px 5px;font-size:10px">${cnt}</span></button>`;
    }).join('');

  // Total amount
  const total=jobs.reduce((a,b)=>a+Number(b.total_amount||0),0);
  document.getElementById('su-total').textContent=fmtCur(total).replace('₹','');

  renderCards(c,jobs,'No upcoming jobs','📅','Check back later');
}

function filterUpcoming(date,el){
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const filtered=date==='all'?upcomingData:upcomingData.filter(b=>b.slots?.date===date);
  renderCards(document.getElementById('upcoming-jobs'),filtered,'No jobs for this date','📅','');
}

async function fetchJobs(f={}){
  let q=db.from('bookings').select(`id,status,service_details,total_amount,advance_amount,attachment_link,
    customers(name,phone,alt_phone,place,address,location_link),
    slots(id,date,time,segment_id,segments(name))`);
  if(f.date)    q=q.eq('slots.date',f.date);
  if(f.dateGt)  q=q.gt('slots.date',f.dateGt);
  if(f.dateLte) q=q.lte('slots.date',f.dateLte);
  if(f.statuses)q=q.in('status',f.statuses);
  q=q.order('slots(time)',{ascending:true}).limit(150);
  const{data}=await q;
  let jobs=data||[];
  if(mySegIds.length)jobs=jobs.filter(b=>mySegIds.includes(String(b.slots?.segment_id)));
  return jobs;
}

function renderCards(c,jobs,emptyMsg,emptyIcon,emptyHint){
  if(!jobs.length){
    c.innerHTML=`<div class="empty"><div class="icon">${emptyIcon}</div><h3>${emptyMsg}</h3><p>${emptyHint}</p></div>`;
    return;
  }
  c.innerHTML=jobs.map(card).join('');
}

function card(b){
  const bal=Math.max(0,Number(b.total_amount||0)-Number(b.advance_amount||0));
  const st=b.status||'booked';
  const hasLoc=b.customers?.location_link;
  const hasPhone=b.customers?.phone;
  const seg=b.slots?.segments?.name||'';
  const stBg={booked:'#dbeafe',completed:'#dcfce7',rescheduled:'#fef3c7',cancelled:'#fee2e2'};
  const stFg={booked:'#1d4ed8',completed:'#16a34a',rescheduled:'#d97706',cancelled:'#dc2626'};
  return `<div class="jc">
    <div class="jc-bar ${st}"></div>
    <div class="jc-body">
      <div class="jc-top">
        <div style="flex:1">
          <div class="jc-name">${esc(b.customers?.name||'—')}</div>
          <div class="jc-meta">
            <span class="badge" style="background:${stBg[st]||'#f1f5f9'};color:${stFg[st]||'#475569'}">${st}</span>
            ${seg?`<span class="badge b-seg">${esc(seg)}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div style="font-size:15px;font-weight:800;color:var(--b700)">${fmtCur(b.total_amount)}</div>
          <div style="font-size:10px;color:var(--s400)">#${b.id}</div>
        </div>
      </div>
      ${hasPhone?`<div class="jc-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><a href="tel:${esc(b.customers.phone)}">${esc(b.customers.phone)}</a>${b.customers.alt_phone?` / ${esc(b.customers.alt_phone)}`:''}</div>`:''}
      <div class="jc-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span><strong>${fmtDate(b.slots?.date)}</strong> · ${fmtTime(b.slots?.time)}</span></div>
      ${hasLoc?`<div class="jc-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><a href="${esc(b.customers.location_link)}" target="_blank">📍 ${esc(b.customers?.place||'Open Map')} ↗</a></div>`
      :b.customers?.place?`<div class="jc-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${esc(b.customers.place)}</span></div>`:''}
      ${b.service_details?`<div class="jc-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>${esc(b.service_details.substring(0,80)+(b.service_details.length>80?'…':''))}</span></div>`:''}
      ${b.customers?.address?`<div class="jc-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>${esc(b.customers.address)}</span></div>`:''}
    </div>
    <div class="jc-fin">
      <div class="jf"><div class="jf-l">Total</div><div class="jf-v">${fmtCur(b.total_amount)}</div></div>
      <div class="jf"><div class="jf-l">Advance</div><div class="jf-v">${fmtCur(b.advance_amount||0)}</div></div>
      <div class="jf"><div class="jf-l">Balance</div><div class="jf-v bl">${fmtCur(bal)}</div></div>
    </div>
    <div class="jc-act">
      ${hasPhone?`<a href="tel:${esc(b.customers.phone)}" class="ja call"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Call</a>`:`<span class="ja off"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> No phone</span>`}
      ${hasLoc?`<a href="${esc(b.customers.location_link)}" target="_blank" class="ja map"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Map</a>`:`<span class="ja off"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> No map</span>`}
      <a href="work-report.html?booking_id=${b.id}" class="ja rpt"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Report</a>
    </div>
  </div>`;
}

function toggleHistory(){
  showingHistory=!showingHistory;
  document.getElementById('mode-today').style.display=showingHistory?'none':'block';
  document.getElementById('mode-history').style.display=showingHistory?'block':'none';
  const btn=document.getElementById('hist-toggle-btn');
  if(showingHistory){
    btn.textContent='← Back to Today';
    btn.style.background='var(--alight)';btn.style.color='var(--adark)';btn.style.borderColor='var(--amber)';
    if(!historyLoaded){
      historyLoaded=true;
      const t=new Date().toISOString().split('T')[0];
      const m=new Date(Date.now()-30*86400000).toISOString().split('T')[0];
      document.getElementById('hist-from').value=m;
      document.getElementById('hist-to').value=t;
      loadHistory();
    }
  } else {
    btn.textContent='📅 View History';
    btn.style.background='var(--b50)';btn.style.color='var(--b700)';btn.style.borderColor='var(--b100)';
  }
}

function switchPage(page,el){
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+page).classList.add('on');
  if(page==='upcoming')loadUpcomingPage();
}

function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(t){if(!t)return'—';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;}
function fmtCur(n){if(n===null||n===undefined)return'₹0';return'₹'+Number(n).toLocaleString('en-IN');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
